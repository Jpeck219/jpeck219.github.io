<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Directory · Sasi Family</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sand: #E8DCC8;
      --parchment: #F5EFE0;
      --terracotta: #C4714A;
      --terracotta-dark: #9E5535;
      --olive: #7A7A52;
      --ink: #2E2A20;
      --muted: #6B6353;
      --light-border: rgba(122,122,82,0.25);
    }
    body { font-family: 'Lato', sans-serif; background: var(--parchment); color: var(--ink); min-height: 100vh; }

    /* NAV */
    nav { background: var(--ink); display: flex; align-items: center; justify-content: space-between; padding: 0 2.5rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .nav-brand { font-family: 'Playfair Display', serif; color: var(--sand); font-size: 1.25rem; letter-spacing: .08em; text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--sand); text-decoration: none; font-size: .88rem; letter-spacing: .1em; text-transform: uppercase; opacity: .8; transition: opacity .2s; }
    .nav-links a:hover { opacity: 1; }
    .nav-links a.active { opacity: 1; border-bottom: 1px solid var(--terracotta); padding-bottom: 2px; }

    /* PAGE HEADER */
    .page-header { text-align: center; padding: 3rem 2rem 2rem; border-bottom: 1px solid var(--light-border); }
    .page-header .eyebrow { font-size: .75rem; letter-spacing: .2em; text-transform: uppercase; color: var(--terracotta); margin-bottom: .6rem; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--ink); margin-bottom: .5rem; }
    .page-header p { color: var(--muted); font-size: .95rem; }

    /* SEARCH */
    .search-bar { max-width: 400px; margin: 2rem auto 0; position: relative; }
    .search-bar input { width: 100%; padding: .65rem 1rem .65rem 2.5rem; border: 1px solid var(--light-border); border-radius: 4px; background: white; font-size: .95rem; font-family: 'Lato', sans-serif; color: var(--ink); outline: none; }
    .search-bar input:focus { border-color: var(--terracotta); }
    .search-bar .search-icon { position: absolute; left: .8rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: .9rem; pointer-events: none; }

    /* GRID */
    .grid-wrap { max-width: 1100px; margin: 2.5rem auto 4rem; padding: 0 2rem; }
    .alpha-section { margin-bottom: 2.5rem; }
    .alpha-label { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--terracotta); border-bottom: 1px solid var(--light-border); padding-bottom: .4rem; margin-bottom: 1.2rem; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.25rem; }

    /* PROFILE CARD */
    .profile-card { background: white; border: 1px solid var(--light-border); border-radius: 6px; overflow: hidden; cursor: pointer; transition: transform .2s, box-shadow .2s; text-align: center; }
    .profile-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(46,42,32,.1); }
    .card-photo { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: var(--sand); display: block; }
    .card-photo-placeholder { width: 100%; aspect-ratio: 1/1; background: var(--sand); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--muted); }
    .card-body { padding: .75rem .6rem; }
    .card-name { font-size: .88rem; font-weight: 700; color: var(--ink); line-height: 1.3; }
    .card-dob { font-size: .75rem; color: var(--muted); margin-top: .25rem; }

    /* MODAL */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(46,42,32,.55); z-index: 500; align-items: center; justify-content: center; padding: 1rem; }
    #modal-overlay.open { display: flex; }
    .modal { background: var(--parchment); border-radius: 8px; width: 100%; max-width: 480px; box-shadow: 0 24px 64px rgba(46,42,32,.2); overflow: hidden; position: relative; max-height: 90vh; overflow-y: auto; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--muted); line-height: 1; }
    .modal-close:hover { color: var(--ink); }
    .modal-top { display: flex; gap: 1.25rem; padding: 1.75rem 1.75rem 1.25rem; align-items: flex-start; }
    .modal-photo { width: 100px; height: 100px; border-radius: 6px; object-fit: cover; background: var(--sand); flex-shrink: 0; }
    .modal-photo-placeholder { width: 100px; height: 100px; border-radius: 6px; background: var(--sand); display: flex; align-items: center; justify-content: center; font-size: 2.8rem; flex-shrink: 0; }
    .modal-name { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--ink); margin-bottom: .3rem; }
    .modal-bio { font-size: .88rem; color: var(--muted); line-height: 1.7; margin-top: .4rem; }
    .modal-divider { height: 1px; background: var(--light-border); margin: 0 1.75rem; }
    .modal-details { padding: 1.25rem 1.75rem 1.75rem; display: flex; flex-direction: column; gap: .75rem; }
    .detail-row { display: flex; gap: .75rem; align-items: flex-start; }
    .detail-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; color: var(--terracotta); width: 80px; flex-shrink: 0; padding-top: 1px; }
    .detail-value { font-size: .9rem; color: var(--ink); }
    .detail-value.deceased { color: var(--muted); font-style: italic; }
    .detail-value a { color: var(--terracotta); text-decoration: none; }
    .detail-value a:hover { text-decoration: underline; }

    /* NO RESULTS */
    .no-results { text-align: center; color: var(--muted); padding: 3rem; font-size: .95rem; }

    #site { display: none; }
  </style>
</head>

function calcAge(dobStr, deceasedStr) {
  if (!dobStr || dobStr.length < 4) return null;
  const dob = new Date(dobStr);
  if (isNaN(dob)) return null;
  const end = deceasedStr ? new Date(deceasedStr) : new Date();
  let age = end.getFullYear() - dob.getFullYear();
  const m = end.getMonth() - dob.getMonth();
  if (m < 0 || (m === 0 && end.getDate() < dob.getDate())) age--;
  return age;
}

function fullName(p) { return (p.first + ' ' + p.last).trim(); }

function sortedFamily() {
  return [...FAMILY].sort((a, b) => {
    const la = a.last || a.first, lb = b.last || b.first;
    return la.localeCompare(lb) || a.first.localeCompare(b.first);
  });
}

function photoEl(p, size='card') {
  if (p.photo) {
    const img = document.createElement(size === 'modal' ? 'img' : 'img');
    img.src = `photos/${p.photo}`;
    img.alt = fullName(p);
    img.className = size === 'modal' ? 'modal-photo' : 'card-photo';
    img.onerror = () => { img.replaceWith(placeholderEl(size)); };
    return img;
  }
  return placeholderEl(size);
}

function placeholderEl(size) {
  const div = document.createElement('div');
  div.className = size === 'modal' ? 'modal-photo-placeholder' : 'card-photo-placeholder';
  div.textContent = '👤';
  return div;
}

// ── RENDER GRID ──
function renderGrid() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  const sorted = sortedFamily().filter(p =>
    !query || fullName(p).toLowerCase().includes(query)
  );

  const wrap = document.getElementById('grid-wrap');
  if (!sorted.length) {
    wrap.innerHTML = '<div class="no-results">No family members found.</div>';
    return;
  }

  // Group by first letter of last name (or first name if no last)
  const groups = {};
  sorted.forEach(p => {
    const key = (p.last || p.first)[0].toUpperCase();
    if (!groups[key]) groups[key] = [];
    groups[key].push(p);
  });

  wrap.innerHTML = '';
  Object.keys(groups).sort().forEach(letter => {
    const section = document.createElement('div');
    section.className = 'alpha-section';
    section.innerHTML = `<div class="alpha-label">${letter}</div>`;
    const grid = document.createElement('div');
    grid.className = 'card-grid';
    groups[letter].forEach(p => {
      const card = document.createElement('div');
      card.className = 'profile-card';
      card.onclick = () => openModal(p);
      const photo = photoEl(p, 'card');
      const body = document.createElement('div');
      body.className = 'card-body';
      const age = calcAge(p.dob, p.deceased);
      body.innerHTML = `
        <div class="card-name">${fullName(p)}</div>
        ${p.dob ? `<div class="card-dob">${age !== null ? (p.deceased ? `${age} · Passed` : `Age ${age}`) : p.dob}</div>` : ''}
      `;
      card.appendChild(photo);
      card.appendChild(body);
      grid.appendChild(card);
    });
    section.appendChild(grid);
    wrap.appendChild(section);
  });
}

// ── MODAL ──
function openModal(p) {
  document.getElementById('modal-name').textContent = fullName(p);
  document.getElementById('modal-bio').textContent = p.bio || '';

  const photoWrap = document.getElementById('modal-photo-wrap');
  photoWrap.innerHTML = '';
  photoWrap.appendChild(photoEl(p, 'modal'));

  const age = calcAge(p.dob, p.deceased);
  let detailsHtml = '';

  if (p.dob) detailsHtml += row('Date of Birth', p.dob);
  if (age !== null) detailsHtml += row('Age', p.deceased ? `${age} (at passing)` : String(age));
  if (p.deceased) detailsHtml += row('Passed Away', `<span class="deceased">${p.deceased}</span>`);
  if (p.phone) detailsHtml += row('Phone', `<a href="tel:${p.phone}">${p.phone}</a>`);
  if (p.email) detailsHtml += row('Email', `<a href="mailto:${p.email}">${p.email}</a>`);

  document.getElementById('modal-details').innerHTML = detailsHtml || '<span style="color:var(--muted);font-size:.88rem;">No additional details yet.</span>';
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function row(label, value) {
  return `<div class="detail-row"><div class="detail-label">${label}</div><div class="detail-value">${value}</div></div>`;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderGrid();
</script>
</body>
</html>
