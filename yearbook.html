<!DOCTYPE html>
<html lang="en">
<head>

  <title>The Family · Sasi Family</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sand: #E8DCC8; --parchment: #F5EFE0; --terracotta: #C4714A;
      --terracotta-dark: #9E5535; --olive: #7A7A52; --ink: #2E2A20;
      --muted: #6B6353; --light-border: rgba(122,122,82,0.25);
    }
    body { font-family: 'Lato', sans-serif; background: var(--parchment); color: var(--ink); min-height: 100vh; }
    nav { background: var(--ink); display: flex; align-items: center; justify-content: space-between; padding: 0 2.5rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .nav-brand { font-family: 'Playfair Display', serif; color: var(--sand); font-size: 1.25rem; letter-spacing: .08em; text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--sand); text-decoration: none; font-size: .88rem; letter-spacing: .1em; text-transform: uppercase; opacity: .8; transition: opacity .2s; }
    .nav-links a:hover { opacity: 1; }
    .nav-links a.active { opacity: 1; border-bottom: 1px solid var(--terracotta); padding-bottom: 2px; }
    .page-header { text-align: center; padding: 3rem 2rem 2rem; border-bottom: 1px solid var(--light-border); }
    .page-header .eyebrow { font-size: .75rem; letter-spacing: .2em; text-transform: uppercase; color: var(--terracotta); margin-bottom: .6rem; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--ink); margin-bottom: .5rem; }
    .page-header p { color: var(--muted); font-size: .95rem; }
    .search-bar { max-width: 400px; margin: 1.5rem auto 0; position: relative; }
    .search-bar input { width: 100%; padding: .65rem 1rem .65rem 2.5rem; border: 1px solid var(--light-border); border-radius: 4px; background: white; font-size: .95rem; font-family: 'Lato', sans-serif; color: var(--ink); outline: none; }
    .search-bar input:focus { border-color: var(--terracotta); }
    .search-icon { position: absolute; left: .8rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .grid-wrap { max-width: 1100px; margin: 2.5rem auto 4rem; padding: 0 2rem; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1.25rem; }
    .profile-card { background: white; border: 1px solid var(--light-border); border-radius: 6px; overflow: hidden; cursor: pointer; transition: transform .2s, box-shadow .2s; text-align: center; }
    .profile-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(46,42,32,.1); }
    .card-photo { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    .card-photo-placeholder { width: 100%; aspect-ratio: 1/1; background: var(--sand); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--muted); }
    .card-body { padding: .75rem .6rem; }
    .card-name { font-size: .88rem; font-weight: 700; color: var(--ink); line-height: 1.3; }
    .card-id { font-size: .7rem; color: var(--terracotta); margin-top: .2rem; letter-spacing: .04em; }
    .card-dob { font-size: .75rem; color: var(--muted); margin-top: .2rem; }
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(46,42,32,.55); z-index: 500; align-items: center; justify-content: center; padding: 1rem; }
    #modal-overlay.open { display: flex; }
    .modal { background: var(--parchment); border-radius: 8px; width: 100%; max-width: 480px; box-shadow: 0 24px 64px rgba(46,42,32,.2); overflow: hidden; position: relative; max-height: 90vh; overflow-y: auto; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--muted); }
    .modal-close:hover { color: var(--ink); }
    .modal-top { display: flex; gap: 1.25rem; padding: 1.75rem 1.75rem 1.25rem; align-items: flex-start; }
    .modal-photo { width: 100px; height: 100px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .modal-photo-placeholder { width: 100px; height: 100px; border-radius: 6px; background: var(--sand); display: flex; align-items: center; justify-content: center; font-size: 2.8rem; flex-shrink: 0; }
    .modal-name { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--ink); margin-bottom: .2rem; }
    .modal-uid { font-size: .75rem; color: var(--terracotta); letter-spacing: .06em; margin-bottom: .3rem; }
    .modal-bio { font-size: .88rem; color: var(--muted); line-height: 1.7; margin-top: .4rem; }
    .modal-divider { height: 1px; background: var(--light-border); margin: 0 1.75rem; }
    .modal-details { padding: 1.25rem 1.75rem 1.75rem; display: flex; flex-direction: column; gap: .75rem; }
    .detail-row { display: flex; gap: .75rem; align-items: flex-start; }
    .detail-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; color: var(--terracotta); width: 80px; flex-shrink: 0; padding-top: 1px; }
    .detail-value { font-size: .9rem; color: var(--ink); }
    .detail-value a { color: var(--terracotta); text-decoration: none; }
    .detail-value a:hover { text-decoration: underline; }
    .no-results { text-align: center; color: var(--muted); padding: 3rem; font-size: .95rem; }
    #site { display: none; }
  </style>
</head>

function fullName(p){return(p.first+' '+p.last).trim();}
function renderGrid(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const filtered=FAMILY.filter(p=>!q||fullName(p).toLowerCase().includes(q));
  const grid=document.getElementById('card-grid');
  if(!filtered.length){grid.innerHTML='<div class="no-results">No family members found.</div>';return;}
  grid.innerHTML=filtered.map(p=>{
    const photoHtml=p.photo
      ?`<img class="card-photo" src="photos/${p.photo}" alt="${fullName(p)}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`+ `<div class="card-photo-placeholder" style="display:none">👤</div>`
      :`<div class="card-photo-placeholder">👤</div>`;
    return `<div class="profile-card" onclick='openModal(${JSON.stringify(JSON.stringify(p)).slice(1,-1)})'>${photoHtml}<div class="card-body"><div class="card-name">${fullName(p)}</div><div class="card-id">${p.id}</div>${p.age?`<div class="card-dob">Age ${p.age}</div>`:p.dob?`<div class="card-dob">${p.dob}</div>`:''}</div></div>`;
  }).join('');
}
function openModal(pJson){
  const p=JSON.parse(pJson);
  document.getElementById('modal-name').textContent=fullName(p);
  document.getElementById('modal-uid').textContent='Family ID: '+p.id;
  document.getElementById('modal-bio').textContent=p.bio||'';
  const w=document.getElementById('modal-photo-wrap');
  w.innerHTML=p.photo?`<img class="modal-photo" src="photos/${p.photo}" alt="${fullName(p)}" onerror="this.outerHTML='<div class=modal-photo-placeholder>👤</div>'">`:`<div class="modal-photo-placeholder">👤</div>`;
  let d='';
  if(p.dob) d+=row('Date of Birth',p.dob);
  if(p.age) d+=row('Age',p.deceased?p.age+' (at passing)':p.age);
  if(p.deceased) d+=row('Passed Away',p.deceased);
  if(p.phone) d+=row('Phone',`<a href="tel:${p.phone}">${p.phone}</a>`);
  if(p.email) d+=row('Email',`<a href="mailto:${p.email}">${p.email}</a>`);
  document.getElementById('modal-details').innerHTML=d||'<span style="color:var(--muted);font-size:.88rem;">No additional details yet.</span>';
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function row(l,v){return `<div class="detail-row"><div class="detail-label">${l}</div><div class="detail-value">${v}</div></div>`;}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
renderGrid();
</script>
